spring.config.activate.on-profile=prod

spring.datasource.hikari.data-source-properties.sslmode=require
spring.jpa.show-sql=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.remote-ip-header=x-forwarded-for

logging.level.com.burgerburst=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.roles=ROLE_ADMIN

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_THRESHOLD:0}
