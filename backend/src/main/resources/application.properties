spring.application.name=burgerburst-backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
spring.profiles.default=local
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true

spring.mvc.problemdetails.enabled=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
info.app.name=BurgerBurst Backend
info.app.phase=5

server.compression.enabled=true
server.compression.min-response-size=2048
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript,text/csv
server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:7d}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.otp.expiry=${OTP_EXPIRY:5m}
app.otp.length=${OTP_LENGTH:6}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.integrations.brevo-api-key=${BREVO_API_KEY:}
app.email.provider=${EMAIL_PROVIDER:log}
app.email.sender-email=${EMAIL_SENDER_EMAIL:}
app.email.sender-name=${EMAIL_SENDER_NAME:BurgerBurst}
app.email.brevo-base-url=${BREVO_API_BASE_URL:https://api.brevo.com}
app.integrations.razorpay-key-id=${RAZORPAY_KEY_ID:}
app.integrations.razorpay-key-secret=${RAZORPAY_KEY_SECRET:}
app.integrations.razorpay-webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
app.integrations.razorpay-api-base-url=${RAZORPAY_API_BASE_URL:https://api.razorpay.com/v1}

app.commerce.reward-point-value=${REWARD_POINT_VALUE:0.01}
app.commerce.reward-points-per-currency-unit=${REWARD_POINTS_PER_CURRENCY_UNIT:1}
app.commerce.maximum-reward-redemption-ratio=${MAXIMUM_REWARD_REDEMPTION_RATIO:0.50}
app.commerce.maximum-cart-item-quantity=${MAXIMUM_CART_ITEM_QUANTITY:20}

app.production.rate-limit-enabled=${RATE_LIMIT_ENABLED:true}
app.production.general-requests=${RATE_LIMIT_GENERAL_REQUESTS:300}
app.production.authentication-requests=${RATE_LIMIT_AUTH_REQUESTS:30}
app.production.otp-requests=${RATE_LIMIT_OTP_REQUESTS:5}
app.production.analytics-requests=${RATE_LIMIT_ANALYTICS_REQUESTS:120}
app.production.general-window=${RATE_LIMIT_GENERAL_WINDOW:1m}
app.production.authentication-window=${RATE_LIMIT_AUTH_WINDOW:15m}
app.production.otp-window=${RATE_LIMIT_OTP_WINDOW:15m}
